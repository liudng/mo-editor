#
# GitHub issue form for reporting bugs in the mo text editor.

name: Bug Report
description: Report a bug or unexpected behavior in mo
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in mo! Please fill
        out the following sections to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Open mo
        2. Open a file with ...
        3. Perform ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Information about your environment.
      placeholder: |
        - OS: (e.g. Debian 13, Ubuntu 26.04)
        - Qt version: (e.g. 6.8.0)
        - mo version: (e.g. 0.1.0)
        - Installation method: (e.g. deb, flatpak, built from source)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Relevant log output. Run mo from a terminal and paste the
        output here. No need for backticks, the output is rendered as
        shell text.
      render: shell
    validations:
      required: false
