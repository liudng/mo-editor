#
# GitHub issue form for requesting new features in the mo text editor.

name: Feature Request
description: Suggest a new feature or enhancement for mo
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for mo! Please describe the
        problem your idea solves and the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Any alternative solutions or features you've considered, and why
        they were insufficient.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Any other context, screenshots, mockups, or references that help
        explain the request.
    validations:
      required: false
