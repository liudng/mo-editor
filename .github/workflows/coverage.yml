#
# Code coverage workflow. Builds the project with coverage instrumentation,
# runs the test suite, generates an lcov report, and uploads the result
# to Codecov for trend tracking.

name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-26.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/coverage.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            qt6-svg-dev \
            libkf6syntaxhighlighting-dev \
            libuchardet-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            breeze-icon-theme \
            ninja-build \
            ccache \
            clang \
            clang-format \
            clang-tidy \
            lcov \
            gcovr

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-coverage-${{ github.sha }}
          restore-keys: |
            ccache-coverage-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DMO_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

      - name: Generate lcov report
        run: |
          lcov --directory build --capture --output-file coverage.info
          lcov --remove coverage.info \
            '/usr/*' \
            '*/build/_deps/*' \
            '*/test/*' \
            '*/tests/*' \
            '*/autogen/*' \
            --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
