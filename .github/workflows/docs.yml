#
# Documentation build and deploy workflow. Builds Doxygen/Sphinx docs
# (with Breathe bridging) and publishes them to GitHub Pages from the
# main branch.

name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/docs.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            qt6-svg-dev \
            libkf6syntaxhighlighting-dev \
            libuchardet-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            breeze-icon-theme \
            ninja-build \
            doxygen \
            graphviz \
            python3-sphinx \
            python3-breathe \
            python3-sphinx-rtd-theme

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DOCS=ON

      - name: Build docs
        run: cmake --build build --target docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: build/docs/html
          if-no-files-found: warn

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs/html
