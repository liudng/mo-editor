#
# Continuous Integration workflow for the mo Qt6 text editor.
# Runs matrix builds across supported compilers and build types on
# every push and pull request targeting the main and develop branches.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            qt6-svg-dev \
            libkf6syntaxhighlighting-dev \
            libuchardet-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            breeze-icon-theme \
            ninja-build \
            ccache \
            clang \
            clang-format \
            clang-tidy

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.compiler }}-${{ matrix.build_type }}-
            ccache-${{ matrix.compiler }}-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload compile_commands
        if: matrix.build_type == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: compile_commands-${{ matrix.compiler }}
          path: build/compile_commands.json
          if-no-files-found: ignore
