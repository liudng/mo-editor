app-id: io.github.liudng.mo
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: mo
finish-args:
  - --socket=wayland
  - --share=ipc
  - --filesystem=host
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - '*.a'
  - '*.la'
modules:
  - name: mo
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DMO_BUILD_TESTS=OFF
      - -DMO_BUILD_FUZZ=OFF
    sources:
      - type: dir
        path: ../..
      - type: shell
        commands:
          - mkdir -p build
