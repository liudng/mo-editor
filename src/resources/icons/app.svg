<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="50%"  stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="inkChar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fefce8"/>
      <stop offset="50%"  stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="52" ry="52" fill="url(#gloss)"/>
  <rect x="0" y="0" width="256" height="256" rx="52" ry="52" fill="none"
        stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <text x="128" y="196"
        font-family="'Noto Serif CJK SC', 'Source Han Serif SC', 'STSong', 'SimSun', serif"
        font-size="158" font-weight="700"
        fill="url(#inkChar)"
        text-anchor="middle"
        dominant-baseline="alphabetic"
        filter="url(#textGlow)">墨</text>
</svg>
